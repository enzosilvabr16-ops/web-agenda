<section class="min-h-screen bg-gradient-to-br from-black via-slate-950 to-blue-950 flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-md">
    <div class="rounded-3xl border border-blue-500/30 bg-black/70 p-8 shadow-2xl shadow-blue-500/20 backdrop-blur-xl">
      
      <div class="mb-8 text-center">

        <!-- Logo WA inclinada -->
        <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-blue-900 via-blue-800 to-black shadow-lg shadow-blue-900/40 border border-blue-700/40">
          <span class="text-xl font-bold text-white tracking-widest">
            WA
          </span>
        </div>

        <p class="mt-2 text-sm text-blue-200/80">
          Acesse sua conta de usuário
        </p>
      </div>

      <form class="space-y-5">
        <div>
          <label for="email" class="mb-2 block text-sm font-medium text-blue-100">
            Email
          </label>

          <input
            id="email"
            name="email"
            type="email"
            placeholder="seuemail@exemplo.com"
            class="w-full rounded-xl border border-blue-500/30 bg-slate-950/80 px-4 py-3 text-white placeholder:text-slate-500 outline-none transition focus:border-blue-400 focus:ring-2 focus:ring-blue-500/40"
          />
        </div>

        <div>
          <label for="senha" class="mb-2 block text-sm font-medium text-blue-100">
            Senha
          </label>

          <input
            id="senha"
            name="senha"
            type="password"
            placeholder="Digite sua senha"
            class="w-full rounded-xl border border-blue-500/30 bg-slate-950/80 px-4 py-3 text-white placeholder:text-slate-500 outline-none transition focus:border-blue-400 focus:ring-2 focus:ring-blue-500/40"
          />
        </div>

        <button
          type="submit"
          class="w-full rounded-xl bg-gradient-to-r from-blue-700 to-blue-500 px-4 py-3 font-semibold text-white shadow-lg shadow-blue-500/25 transition hover:from-blue-600 hover:to-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2 focus:ring-offset-black"
        >
          Acessar conta
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-400">
        Não tem uma conta?
        <a
          href="/criar-conta"
          class="font-medium text-blue-400 transition hover:text-blue-300 hover:underline"
        >
          Criar conta
        </a>
      </p>
    </div>
  </div>
</section>
